<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxMusic - Registrarse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #121418;
            color: #e2e8f0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 2rem 0;
        }

        .login-card {
            background-color: #1a1d24;
            border: 1px solid #2a2f3a;
            border-radius: 16px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
        }

        .brand-title {
            font-weight: 800;
            letter-spacing: -1px;
            color: #ffffff;
            font-size: 2.2rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .brand-title span {
            color: #bc42ca;
        }

        .subtitle {
            color: #8a94a6;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .form-label {
            color: #8a94a6;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .form-flux-input {
            background-color: #121418 !important;
            border: 1px solid #3a4254 !important;
            color: #ffffff !important;
            border-radius: 8px;
            padding: 0.75rem 1rem;
        }

        .form-flux-input:focus {
            border-color: #2fdbb7 !important;
            box-shadow: 0 0 0 0.25rem rgba(47, 219, 183, 0.15) !important;
        }

        .btn-flux {
            background: linear-gradient(135deg, #3b82f6 0%, #bc42ca 100%);
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.75rem;
            border-radius: 8px;
            margin-top: 1rem;
            transition: opacity 0.2s ease;
        }

        .btn-flux:hover {
            opacity: 0.9;
            color: white;
        }

        .btn-flux-outline {
            background: transparent;
            border: 1px solid #3a4254;
            color: #8a94a6;
            font-weight: 600;
            padding: 0.75rem;
            border-radius: 8px;
            margin-top: 0.75rem;
            transition: all 0.3s ease;
            display: block;
            text-align: center;
            text-decoration: none;
        }

        .btn-flux-outline:hover {
            border-color: #2fdbb7;
            color: #2fdbb7;
            background-color: rgba(47, 219, 183, 0.05);
        }

        /* --- NUEVO CSS PARA LOS MENSAJES --- */
        .alert-flux-error {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #f87171; /* Rojo */
            font-size: 0.85rem;
            border-radius: 8px;
        }

        .alert-flux-success {
            background-color: rgba(47, 219, 183, 0.1);
            border: 1px solid rgba(47, 219, 183, 0.25);
            color: #2fdbb7; /* Verde menta/Cyan */
            font-size: 0.85rem;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h1 class="brand-title">FLUX<span>MUSIC</span></h1>
    <p class="subtitle">Únete a la plataforma</p>

    {% if messages %}
        {% for message in messages %}
            <div class="alert text-center mb-3 {% if message.tags == 'success' %}alert-flux-success{% else %}alert-flux-error{% endif %}" role="alert">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="">
        {% csrf_token %}
        
        <div class="mb-3">
            <label for="nickname" class="form-label">NICKNAME / USUARIO</label>
            <input type="text" name="nickname" id="nickname" class="form-control form-flux-input" placeholder="Tu apodo musical" required>
        </div>

        <div class="row">
            <div class="col-sm-6 mb-3">
                <label for="email" class="form-label">CORREO ELECTRÓNICO</label>
                <input type="email" name="email" id="email" class="form-control form-flux-input" placeholder="ejemplo@flux.com" required>
            </div>
            
            <div class="col-sm-6 mb-3">
                <label for="pais" class="form-label">PAÍS</label>
                <input type="text" name="pais" id="pais" class="form-control form-flux-input" placeholder="Ej: Ecuador" required>
            </div>
        </div>

        <div class="row">
            <div class="col-sm-6 mb-3">
                <label for="password" class="form-label">CONTRASEÑA</label>
                <input type="password" name="password" id="password" class="form-control form-flux-input" placeholder="••••••••" required>
            </div>
            <div class="col-sm-6 mb-3">
                <label for="password_confirm" class="form-label">CONFIRMAR</label>
                <input type="password" name="password_confirm" id="password_confirm" class="form-control form-flux-input" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" class="btn btn-flux w-100">Crear Cuenta</button>
        
        <a href="{% url 'login' %}" class="btn-flux-outline w-100">¿Ya tienes cuenta? Inicia Sesión</a>    
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
