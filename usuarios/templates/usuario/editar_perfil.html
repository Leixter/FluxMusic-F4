<style>
    .profile-card,
.settings-card{
    background:#121418;
    border:1px solid #2a2f3a;
    border-radius:30px;
    padding:3rem;
    max-width:900px;
    margin:auto;
}

.profile-header{
    display:flex;
    gap:30px;
    align-items:center;
    margin-bottom:30px;
}

.profile-avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    background:linear-gradient(
        135deg,
        #2fdbb7,
        #bc42ca
    );

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:2.5rem;
    font-weight:800;
    color:white;
}

.profile-name{
    font-size:2rem;
    font-weight:700;
}

.profile-email{
    color:#8a94a6;
}

.role-badge{
    background:#bc42ca20;
    color:#bc42ca;
    padding:8px 16px;
    border-radius:50px;
}

.separator{
    border-color:#2a2f3a;
    margin:30px 0;
}

.info-card{
    background:#1a1d24;
    border:1px solid #2a2f3a;
    border-radius:20px;
    padding:25px;
}

.info-label{
    color:#8a94a6;
    display:block;
    margin-bottom:10px;
}

.actions-container{
    margin-top:35px;
    display:flex;
    gap:15px;
}

.btn-flux{
    background:#2fdbb7;
    color:#121418;
    border:none;
    border-radius:50px;
    padding:14px 28px;
    font-weight:700;
}

.btn-flux:hover{
    background:#27c6a5;
}

.flux-input{
    background:#1a1d24;
    border:1px solid #2a2f3a;
    color:white;
    border-radius:14px;
    padding:14px;
}

.flux-input:focus{
    background:#1a1d24;
    color:white;
    border-color:#bc42ca;
    box-shadow:none;
}

.danger-zone{
    margin-top:50px;
    padding-top:30px;
    border-top:1px solid #2a2f3a;
}

.btn-flux-outline {
    background: transparent;
    border: 1px solid #3a4254;
    color: #8a94a6;
    font-weight: 600;
    padding: 0.75rem;
    border-radius: 8px;
    margin-top: 0.75rem; /* Separación con el botón principal */
    transition: all 0.3s ease;
    display: block; /* Para que ocupe todo el ancho con w-100 */
    text-align: center;
    text-decoration: none;
}
</style>

{% extends 'Mainbase.html' %}

{% block title %}
Editar Perfil
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="settings-card">

        <h2 class="section-title">
            Editar Perfil
        </h2>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-4">

                <label class="form-label">
                    Nickname
                </label>

                <input
                    type="text"
                    name="nickname"
                    class="form-control flux-input"
                    value="{{ usuario.nickname }}"
                    required>

            </div>

            <button
                type="submit"
                class="btn-flux-outline w-100">

                Guardar Cambios

            </button>

        </form>

        <div class="danger-zone">

            <h4>
                Zona de peligro ⚠
            </h4>

            <p>
                Esta acción es irreversible.
            </p>

            <form method="POST"
                  action="{% url 'eliminar_cuenta' %}">

                {% csrf_token %}

                <button
                    class="btn btn-danger">

                    Eliminar Cuenta

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
