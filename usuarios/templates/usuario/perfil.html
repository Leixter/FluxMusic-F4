<style>
    .profile-card,
.settings-card{
    background:#121418;
    border:1px solid #2a2f3a;
    border-radius:30px;
    padding:3rem;
    max-width:900px;
    margin:auto;
}

.profile-header{
    display:flex;
    gap:30px;
    align-items:center;
    margin-bottom:30px;
}

.profile-avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    background:linear-gradient(
        135deg,
        #2fdbb7,
        #bc42ca
    );

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:2.5rem;
    font-weight:800;
    color:white;
}

.profile-name{
    font-size:2rem;
    font-weight:700;
}

.profile-email{
    color:#8a94a6;
}

.role-badge{
    background:#bc42ca20;
    color:#bc42ca;
    padding:8px 16px;
    border-radius:50px;
}

.separator{
    border-color:#2a2f3a;
    margin:30px 0;
}

.info-card{
    background:#1a1d24;
    border:1px solid #2a2f3a;
    border-radius:20px;
    padding:25px;
}

.info-label{
    color:#8a94a6;
    display:block;
    margin-bottom:10px;
}

.actions-container{
    margin-top:35px;
    display:flex;
    gap:15px;
}

.btn-flux{
    background:#2fdbb7;
    color:#121418;
    border:none;
    border-radius:50px;
    padding:14px 28px;
    font-weight:700;
}

.btn-flux:hover{
    background:#27c6a5;
}

.flux-input{
    background:#1a1d24;
    border:1px solid #2a2f3a;
    color:white;
    border-radius:14px;
    padding:14px;
}

.flux-input:focus{
    background:#1a1d24;
    color:white;
    border-color:#bc42ca;
    box-shadow:none;
}

.danger-zone{
    margin-top:50px;
    padding-top:30px;
    border-top:1px solid #2a2f3a;
}
</style>

{% extends 'Mainbase.html' %}
{% load static %}

{% block title %}
Mi Perfil
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="profile-card">

        <div class="profile-header">

                <h1 class="profile-name">
                    Conoce tu perfil
                </h1>

        </div>

        <hr class="separator">

        <div class="row gy-4">

            <div class="col-md-6">

                <div class="info-card">

                    <span class="info-label">
                        Nickname
                    </span>

                    <h5>
                        {{ usuario.1 }}
                    </h5>

                </div>

            </div>

            <div class="col-md-6">

                <div class="info-card">

                    <span class="info-label">
                        Correo
                    </span>

                    <h5>
                        {{ usuario.2 }}
                    </h5>

                </div>

            </div>

            <div class="col-md-6">

                <div class="info-card">

                    <span class="info-label">
                        Tipo de cuenta
                    </span>

                    <h5>
                        {{ usuario.4 }}
                    </h5>

                </div>

            </div>

            <div class="col-md-6">

                <div class="info-card">

                    <span class="info-label">
                        Pais
                    </span>

                    <h5>
                        {{ usuario.3 }}
                    </h5>

                </div>

            </div>

        </div>

        <div class="actions-container">

            <a href="{% url 'editar_perfil' %}"
               class="btn btn-outline-light">

                Editar Perfil

            </a>

            <a href="{% url 'cambiar_password' %}"
               class="btn btn-outline-light">

                Cambiar Contraseña

            </a>

        </div>

    </div>

</div>

{% endblock %}
